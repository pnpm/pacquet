name: Dylint

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - '**/*.md'
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  dylint:
    name: Dylint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      # Cache the artifacts dylint produces and consumes:
      #   * `~/.cargo`                — registry index, source cache,
      #                                 and the installed `cargo-dylint` /
      #                                 `dylint-link` binaries.
      #   * `~/.dylint_drivers`       — per-toolchain rustc drivers that
      #                                 dylint downloads on first use.
      #   * `target`                  — including `target/dylint`, where
      #                                 dylint builds the `libperfectionist.so`
      #                                 lint library.
      #
      # Restore keys are layered from strictest to loosest so we still
      # benefit from a partial cache when only `Cargo.lock` changes.
      - name: Cache
        id: cache
        uses: actions/cache@v5
        timeout-minutes: 2
        continue-on-error: true
        with:
          path: |
            ~/.cargo
            ~/.dylint_drivers
            target
          key: ${{ github.job }}-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-${{ hashFiles('dylint.toml') }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ github.job }}-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-${{ hashFiles('dylint.toml') }}-${{ hashFiles('**/Cargo.lock') }}
            ${{ github.job }}-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-${{ hashFiles('dylint.toml') }}-
            ${{ github.job }}-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-

      - name: Install Rust Toolchain
        uses: ./.github/actions/rustup
        with:
          # Disable Swatinem/rust-cache: it strips `target/` aggressively
          # before saving, which would wipe the `target/dylint`
          # `libperfectionist.so` we want to preserve. The `actions/cache`
          # step above handles caching instead.
          restore-cache: false

      - name: Install cargo-dylint and dylint-link
        uses: ./.github/actions/binstall
        with:
          packages: cargo-dylint dylint-link

      # When the primary cache key did not match exactly, the cache was
      # either missed entirely or restored from one of the looser
      # `restore-keys` entries. The third entry ignores `dylint.toml`,
      # so the restored `target/dylint/libraries/libperfectionist.so` may
      # have been built from a different `dylint.toml` (different
      # perfectionist `tag`, different per-rule config, etc.).
      # `cargo dylint` does not always detect a changed `git` `rev` /
      # `tag` and would reuse the cached `.so` as-is. Remove the dylint
      # build directory in this case so the library rebuilds from the
      # in-tree `dylint.toml`. On an exact cache hit the `.so` already
      # matches `dylint.toml` and the rebuild is skipped.
      - name: Invalidate stale dylint build artifacts
        if: steps.cache.outputs.cache-hit != 'true'
        shell: bash
        run: rm -rf target/dylint

      - name: Run dylint
        run: cargo dylint --all -- --all-targets --workspace
