allowBuilds:
  core-js: false

# Verdaccio's CJS deps (notably `@verdaccio/signature` requiring
# `@verdaccio/config`) don't resolve correctly under pnpm's strict
# isolation when running the `@pnpm/registry-mock` binary from a
# nested install. Hoisting the dep tree here matches what pnpm's own
# test harness implicitly does via its programmatic-API entry, and
# keeps the launch path simple (Rust calls the CLI binary; verdaccio
# resolves its deps from a flat node_modules).
nodeLinker: hoisted
