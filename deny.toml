# Configuration for cargo-deny (https://embarkstudios.github.io/cargo-deny/).
# The schema evolves fast; fields follow the 0.19+ format.

# --- Graph ---------------------------------------------------------------
[graph]
targets = []
all-features = false
no-default-features = false

# --- Output --------------------------------------------------------------
[output]
feature-depth = 1

# --- Advisories ----------------------------------------------------------
# https://embarkstudios.github.io/cargo-deny/checks/advisories/cfg.html
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# Scope for RUSTSEC unmaintained advisories.
# One of "all", "workspace", "transitive", "none".
unmaintained = "workspace"
# yanked-crates check: "deny" | "warn" | "allow"
yanked = "warn"
# Pre-existing advisories in transitive dependencies pinned to the old rust
# toolchain (1.73.0). Dependency bumps to resolve them are tracked separately
# from the v9-lockfile / install-error-propagation work in this PR.
ignore = [
  "RUSTSEC-2024-0003", # h2 cpu exhaustion
  "RUSTSEC-2024-0019", # mio named-pipe tokens
  "RUSTSEC-2024-0332", # h2 CONTINUATION flood
  "RUSTSEC-2024-0357", # openssl MemBio::get_buf UB
  "RUSTSEC-2024-0421", # idna Punycode
  "RUSTSEC-2025-0004", # openssl select_next_proto UAF
  "RUSTSEC-2025-0022", # openssl MD/cipher fetch UAF
  "RUSTSEC-2025-0023", # bytes BytesMut::reserve overflow
  "RUSTSEC-2025-0055", # tar-rs unpack_in symlink chmod
  "RUSTSEC-2026-0007", # tar-rs PAX size header
  "RUSTSEC-2026-0067", # tokio broadcast channel unsoundness
  "RUSTSEC-2026-0068", # tracing-subscriber ANSI log poisoning
]

# --- Licenses ------------------------------------------------------------
# https://embarkstudios.github.io/cargo-deny/checks/licenses/cfg.html
[licenses]
allow = [
  "MIT",
  "MPL-2.0", # required by mockito, which is used by tasks/micro-benchmark
  "Apache-2.0",
  "Unicode-DFS-2016",
  "BSD-3-Clause",
  "BSL-1.0",
  "ISC",
  "Unlicense", # required by portpicker, which is used by crates/registry-mock
]
confidence-threshold = 0.8
exceptions = []

[[licenses.clarify]]
name = "ring"
version = "*"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
  { path = "LICENSE", hash = 0xbd0eed23 },
]

[licenses.private]
ignore = false
registries = []

# --- Bans ----------------------------------------------------------------
# https://embarkstudios.github.io/cargo-deny/checks/bans/cfg.html
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

# --- Sources -------------------------------------------------------------
# https://embarkstudios.github.io/cargo-deny/checks/sources/cfg.html
[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
